name: ci-runtime-unraid

on: [push, pull_request]

jobs:
  unraid-preclear:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            pkg-config \
            autotools-dev \
            libncurses5-dev \
            libparted-dev \
            libconfig-dev \
            libconfig++-dev \
            dmidecode \
            smartmontools \
            hdparm \
            util-linux

      - name: Create Autoconf files
        run: ./autogen.sh

      - name: Configure
        run: ./configure CFLAGS='-O0 -g -Wall -Wextra' CXXFLAGS='-O0 -g -Wall -Wextra'

      - name: Build
        run: make -j"$(nproc)"

      - name: Run Unraid Preclear integration tests
        run: |
          chmod +x tests/ci/unraid_preclear.sh
          sudo -E env NWIPE_CI_ARTIFACT_DIR="$PWD/ci-artifacts/unraid" \
            tests/ci/unraid_preclear.sh ./src/nwipe

      - name: Upload Unraid Preclear artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unraid-preclear-logs
          path: ci-artifacts/unraid
          if-no-files-found: ignore
